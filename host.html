<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host - F1 Race Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="host_style.css">
</head>
<body>
    <div id="top-nav">
        <a id="home-link" href="index.html">
            <span>&larr;</span> Back to Paddock
        </a>
        <a id="home-link" href="leaderboard.html">
            Leaderboard
        </a>
    </div>
    <div class="header-container">
        <h1 id="host-title">F1 Bingo 2026 - Race Control</h1>
        <button id="add-event-trigger" class="btn-add-main" style="display:none;" onclick="openModal()">+ ADD EVENT</button>
    </div>

    <div id="auth">
        <input type="password" id="pass" placeholder="Secret Key" style="padding: 8px;">
        <button onclick="login()" style="background: var(--f1-red); color: white;">Login</button>
    </div>

    <div id="controls" style="display:none;">
        <div id="race-selector-container">
            <label for="race-select">Race:</label>
            <select id="race-select" onchange="saveSelectedRace()" disabled>
                <option>Loading races...</option>
            </select>
            <button id="end-race-btn" onclick="endRace()">END RACE</button>
        </div>
        <div class="control-group">
            <label for="race-round-input">Official Race Round:</label>
            <input 
                type="number" 
                id="race-round-input" 
                value="1" 
                min="1" 
                onchange="saveSelectedRaceRound()"
                style="width: 60px; padding: 5px; border-radius: 4px;"
            >
        </div>
        <div id="search-container">
            <input type="text" id="event-search" placeholder="Search events (e.g. 'Safety Car' or 'Max')..." onkeyup="filterEvents()">
        </div>
        <div id="list"></div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">New Pool Event</h2>
            <input type="text" id="new-event-text" placeholder="e.g. Hamilton overtakes Perez">
            <select id="new-event-points" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #111; color: white; border: 1px solid #444;">
                <option value="1" style="color: #ffffff;">1 Point (Common)</option>
                <option value="2" style="color: #3c7a3e;">2 Points (Uncommon)</option>
                <option value="3" style="color: #19629e;">3 Points (Rare)</option>
                <option value="4" style="color: #9c27b0;">4 Points (Epic)</option>
                <option value="5" style="color: #910C0C;">5 Points (CHAOS)</option>
            </select>
            <div class="modal-actions">
                <button onclick="closeModal()" style="background:#555; color:white;">Cancel</button>
                <button onclick="saveNewEvent()" style="background:var(--f1-red); color:white;">Add to Race</button>
            </div>
        </div>
    </div>
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Edit Event</h2>
            <input type="hidden" id="edit-event-id">
            <input type="hidden" id="edit-event-old-text">
            <input type="text" id="edit-event-text" placeholder="Event description">
            <select id="edit-event-points" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #111; color: white; border: 1px solid #444;">
                <option value="1" style="color: #ffffff;">1 Point (Common)</option>
                <option value="2" style="color: #3c7a3e;">2 Points (Uncommon)</option>
                <option value="3" style="color: #19629e;">3 Points (Rare)</option>
                <option value="4" style="color: #9c27b0;">4 Points (Epic)</option>
                <option value="5" style="color: #910C0C;">5 Points (CHAOS)</option>
            </select>
            <div class="modal-actions">
                <button onclick="closeEditModal()" style="background:#555; color:white;">Cancel</button>
                <button onclick="saveEditEvent()" style="background:var(--f1-red); color:white;">Update Event</button>
            </div>
        </div>
    </div>

    <script src="host.js"></script>
    
</body>
</html>
