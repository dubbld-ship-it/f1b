<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Bingo - Join the Race</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index_style.css">
</head>
<body>

<div class="container">
    <div id="top-nav">
        <a id="home-link" href="leaderboard.html">
            Leaderboard
        </a>
    </div>
    <h1>F1 Bingo 2026</h1>
    <p>Select your entry type below</p>

    <a href="player.html" class="btn btn-new" onclick="localStorage.removeItem('f1_bingo_id')">New Board</a>

    <hr style="border: 0.5px solid #444; margin: 25px 0;">

    <div id="recovery-section">
        <p>Already registered on another device?</p>
        <input type="text" id="recover-name" placeholder="Enter your Driver Name (case sensitive and unique)">
        <button class="btn btn-recover" onclick="recoverBoard()">Find My Board</button>
    </div>
    <hr style="border: 0.5px solid #444; margin: 25px 0;">
    <div id="grid-section" style="margin-top: 30px; text-align: left;">
        <h3 style="font-style: italic; border-left: 4px solid var(--f1-red); padding-left: 10px; text-transform: uppercase; font-size: 0.9rem;">
            Current Starting Grid
        </h3>
        <div id="driver-list" style="max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 4px; padding: 10px; font-size: 0.85rem; margin-top: 10px;">
            Loading drivers...
        </div>
    </div>
    <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 15px;">
        <a href="host.html" style="color: #666; text-decoration: none; font-size: 0.8em; letter-spacing: 1px;">
            HOST ACCESS
        </a>
    </div>

</div>
<script src="index.js"></script>

</body>
</html>
